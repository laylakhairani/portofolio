<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontak | Portfolio Mahasiswa</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <div class="container header-container">
        <div class="logo"><span class="logo-icon">✦</span> My Portofolio</div>
        <nav>
          <ul class="nav-links">
            <li><a href="index.html" class="nav-link">Beranda</a></li>
            <li><a href="profil.html" class="nav-link">Profil</a></li>
            <li><a href="kontak.html" class="nav-link active">Kontak</a></li>
          </ul>
          <button id="darkModeToggle" class="dark-toggle">Dark</button>
        </nav>
      </div>
    </header>

    <main>
      <div class="container contact-wrapper">
        <div class="glass-card contact-card">
          <h2>Hubungi Saya</h2>
          <p>
            Isi formulir di bawah ini, saya akan segera merespon pesan Anda.
          </p>
          <form id="contactForm" class="contact-form">
            <div class="form-group">
              <label for="name"
                >Nama Lengkap <span class="required"></span
              ></label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Layla Khairani"
                autocomplete="off"
              />
              <div class="error-msg" id="nameError"></div>
            </div>
            <div class="form-group">
              <label for="email"
                >Alamat Email <span class="required"></span
              ></label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="layla@example.com"
              />
              <div class="error-msg" id="emailError"></div>
            </div>
            <div class="form-group">
              <label for="message">Pesan / Pertanyaan</label>
              <textarea
                id="message"
                name="message"
                rows="5"
                placeholder="Tulis pesan Anda di sini..."
              ></textarea>
            </div>
            <button type="submit" class="btn-primary submit-btn">
              Kirim Pesan
            </button>
          </form>
          <div id="formStatus" class="form-status"></div>
        </div>
        <div class="contact-info modern-card">
          <h3>Info Lain</h3>
          <p><strong>Email kampus:</strong> laylakhairani@uhamka.ac.id</p>
          <p><strong>GitHub:</strong> /laylakhairani</p>
          <p><strong>Instagram:</strong> @khairanni._</p>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <p>© 2026 Layla Khairani | Semua hak dilindungi.</p>
      </div>
    </footer>
  </body>
</html>
